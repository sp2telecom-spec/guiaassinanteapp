name: Atualizar EPG Diariamente

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    # IMPORTANTE: Garante que o workflow tem permissão de escrita diretamente no código
    permissions:
      contents: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        # Garante que o repositório seja baixado com permissões de persistência para o push
        persist-credentials: true 

    - name: Baixar os arquivos EPG atualizados
      run: |
        # Fonte 1: epgshare01 (BR1)
        curl -L "https://epgshare01.online/epgshare01/epg_ripper_BR1.xml.gz" -o epg1.xml.gz
        gunzip -f epg1.xml.gz
         
        # Fonte 2: epg.pw
        curl -L "https://epg.pw/xmltv/epg_BR.xml" -o epg2.xml

        # Fonte 3: epgshare01 (BR2)
        curl -L "https://epgshare01.online/epgshare01/epg_ripper_BR2.xml.gz" -o epg3.xml.gz
        gunzip -f epg3.xml.gz

    - name: Commit e Push das alterações
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add epg1.xml epg2.xml epg3.xml
        
        # Só faz o commit se houver mudanças reais nos arquivos
        if ! git diff --quiet HEAD; then
          git commit -m "Atualização automática das fontes de EPG (Fontes 1, 2 e 3)"
          git push
        else
          echo "Nenhuma alteração detectada nos arquivos EPG."
        fi
