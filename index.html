<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GUIA TV + APP SP2TV</title>

<style>
html, body {
  width: 100%;
  height: 1080px;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent; 
  font-family: 'Segoe UI', Arial, sans-serif;
  color: #fff;
}

/* ==========================================
   WIDGET DE CLIMA E RELÓGIO (2 CIDADES POR VEZ)
   ========================================== */
.widget-moderno {
  position: fixed;
  top: 30px;
  right: 40px;
  width: 420px; 
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px 25px;
  background: rgba(15, 15, 15, 0.7);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-radius: 25px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  z-index: 10000;
}

.widget-moderno .header-relogio {
  display: flex;
  flex-direction: column; 
  align-items: flex-end;
  border-bottom: 2px solid rgba(255, 255, 255, 0.2);
  padding-bottom: 12px;
  margin-bottom: 8px;
}

.widget-moderno .hora {
  font-size: 72px; 
  font-weight: 800;
  line-height: 1;
  letter-spacing: -1px;
  color: #ffffff;
  text-shadow: 0 0 15px rgba(0,0,0,0.6);
}

.widget-moderno .data {
  font-size: 22px; 
  font-weight: 400;
  margin-top: 5px;
  opacity: 0.9;
  text-transform: capitalize;
  color: #00c853; 
}

.widget-moderno .lista-cidades {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.widget-moderno .item-cidade {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.08);
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.widget-moderno .cidade-nome {
  font-size: 19px; 
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 240px;
}

.widget-moderno .clima-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.widget-moderno .temp {
  font-size: 24px; 
  font-weight: 700;
}

.widget-moderno img {
  width: 32px; 
  height: 32px;
}

/* ==========================================
   CAROUSEL E LAYOUT (FONTES DO GUIA REDUZIDAS)
   ========================================== */
.carousel-container {
  width: 100%;
  position: fixed;
  bottom: 0;
  left: 0;
  padding: 25px 0;
  z-index: 9999;
}

.carousel-wrapper {
  overflow: hidden;
  width: calc(100% - 80px); 
  margin: 0 auto;
}

.carousel-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 170px); 
  gap: 20px; 
}

.channel {
  height: 170px;
  background: rgba(18, 18, 18, 0.85); 
  backdrop-filter: blur(15px);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center; 
  gap: 18px;               
  box-sizing: border-box;
}

.logo-container {
  width: 110px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0; 
}

.logo {
  max-width: 100%;
  max-height: 110px;
  object-fit: contain;
}

.channel-info {
  flex-grow: 1;
  min-width: 0; 
}

.title {
  font-size: 21px; /* Reduzido de 24px */
  font-weight: 700;
  margin-bottom: 5px;
  color: #fff;
}

.program {
  font-size: 16px; /* Reduzido de 18px */
  line-height: 1.3;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2; 
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.next {
  font-size: 14px; /* Reduzido de 15px */
  opacity: .8;
  color: #ccc;
}

.progress {
  height: 6px;
  background: rgba(255, 255, 255, 0.15);
  margin: 10px 0;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: #00c853; 
}

/* CARD DE NOTÍCIAS */
.news-full-card {
  grid-column: span 3;
  grid-row: span 2;
  height: 360px;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(15px);
  border: 2px solid #00c853;
  border-radius: 20px;
  padding: 30px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.news-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 10px;
}

.news-badge {
  background: #00c853;
  color: #000;
  padding: 6px 14px;
  font-weight: 800;
  border-radius: 8px;
  font-size: 16px;
  text-transform: uppercase;
}

.news-source {
  font-size: 16px;
  color: #a0aec0;
  font-weight: bold;
}

.news-title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.4;
  color: #fff;
  margin: 20px 0;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-footer {
  font-size: 14px;
  color: #718096;
  text-align: right;
}
</style>
</head>

<body>

<div class="widget-moderno">
  <div class="header-relogio">
    <div class="hora" id="hora">00:00</div>
    <div class="data" id="data">Carregando...</div>
  </div>
  <div class="lista-cidades" id="container-clima"></div>
</div>

<div class="carousel-container">
  <div class="carousel-wrapper">
    <div id="carousel" class="carousel-grid"></div>
  </div>
</div>

<script>
const EPG_URLS = [
  { idFonte: 3, url: "https://raw.githubusercontent.com/sp2telecom-spec/guia-assinante2/master/epg3.xml", ajusteHoras: 0 },
  { idFonte: 1, url: "https://raw.githubusercontent.com/sp2telecom-spec/guia-assinante2/master/epg1.xml", ajusteHoras: 0 },
  { idFonte: 2, url: "https://raw.githubusercontent.com/sp2telecom-spec/guia-assinante2/master/epg2.xml", ajusteHoras: 0 }
];

const canais = [
  {num:"02.6", nome:"BAND", id:["band", "band.br", "Band.br", "BandSP.br", "Sao.Paulo/SP..Band.br", "São.Paulo/SP..Band.br", "523315"], logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Rede_Bandeirantes_logo_2018.svg"},
  {num:"03.2", nome:"CNN BRASIL", id:["São.Paulo/SP..CNN.Brasil.HD.br", "São.Paulo/SP..CNN.Brasil.br", "CNNBrasil.br"], logo:"https://upload.wikimedia.org/wikipedia/commons/8/8b/CNN_Brasil_%28red_background%29.svg"},
  {num:"06.1", nome:"EPTV / GLOBO", id:["eptv", "globo", "globo.br", "EPTV.br", "EPTVCampinas.br", "Globo.br", "Sao.Paulo/SP..Globo.br", "São.Paulo/SP..Globo.br"], logo:"https://upload.wikimedia.org/wikipedia/pt/6/67/EPTV.png"},
  {num:"08.1", nome:"ESPN HD", id:["espn", "espn.br", "ESPN.br", "ESPN1.br", "418725"], logo:"https://upload.wikimedia.org/wikipedia/commons/2/2f/ESPN_wordmark.svg"},
  {num:"09.1", nome:"CARTOON NETWORK", id:["cartoon_network", "cartoonnetwork", "CartoonNetwork.br", "Sao.Paulo/SP..Cartoon.Network.br", "São.Paulo/SP..Cartoon.Network.br", "548619"], logo:"https://upload.wikimedia.org/wikipedia/commons/8/80/Cartoon_Network_2010_logo.svg"},
  {num:"09.5", nome:"DISCOVERY KIDS", id:["discovery_kids", "discoverykids", "DiscoveryKids.br", "Sao.Paulo/SP..Discovery.Kids.br", "São.Paulo/SP..Discovery.Kids.br", "426202"], logo:"https://upload.wikimedia.org/wikipedia/commons/7/7f/Discovery_Kids_2021_2D_sin_wordmark.svg"},
  {num:"09.6", nome:"REDE TV", id:["redetv", "rede_tv", "RedeTV.br", "Sao.Paulo/SP..Rede.TV.br", "São.Paulo/SP..Rede.TV.br", "523301"], logo:"https://upload.wikimedia.org/wikipedia/commons/1/11/RedeTV%21_2019_logo.png"},
  {num:"13.1", nome:"RECORD TV", id:["Record.TV.br", "São.Paulo/SP..Record.br", "São.Paulo/SP..Record.HD.br", "record", "record.br", "Record.br", "RecordSP.br", "Sao.Paulo/SP..Record.br"], logo:"https://upload.wikimedia.org/wikipedia/pt/0/0e/Logotipo_da_Record_%28rede_de_televis%C3%A3o%29.png"},
  {num:"30.1", nome:"TV CULTURA", id:["TV.Cultura.br", "tvcultura", "TVCultura.br", "Cultura.br", "São.Paulo/SP..Cultura.br", "São.Paulo/SP..Cultura.HD.br"], logo:"https://upload.wikimedia.org/wikipedia/commons/8/82/Cultura_logo_2013.svg"},
  {num:"34.2", nome:"DISCOVERY CHANNEL", id:["discovery", "discovery_channel", "DiscoveryChannel.br", "Discovery.br", "Sao.Paulo/SP..Discovery.Channel.br", "São.Paulo/SP..Discovery.Channel.br"], logo:"https://upload.wikimedia.org/wikipedia/commons/f/f1/2019_Discovery_logo.svg"},
  {num:"35.2", nome:"WARNER CHANNEL", id:["Warner.Channel.br", "warner", "warner_channel", "WarnerChannel.br", "Warner.br", "São.Paulo/SP..Warner.Channel.br", "São.Paulo/SP..Warner.Channel.HD.br"], logo:"https://upload.wikimedia.org/wikipedia/commons/b/b0/Warner_Channel_2026.svg"},
  {num:"39.1", nome:"SBT", id:["sbt", "sbt.br", "SBT.br", "SBTSP.br", "Sao.Paulo/SP..SBT.br", "São.Paulo/SP..SBT.br"], logo:"https://upload.wikimedia.org/wikipedia/pt/4/41/Logotipo_do_SBT.svg"}
];

let cacheProgramas = []; 
let cacheNoticias = [];
let paginaAtual = 0; 
let indexNoticiaAtual = 0;
const itensPorPagina = 6; 
const totalPaginasCanais = Math.ceil(canais.length / itensPorPagina);

function atualizarWidgetHorario() {
  const agora = new Date();
  const hElement = document.getElementById("hora");
  if(hElement) hElement.innerText = agora.toLocaleTimeString("pt-BR", { timeZone: "America/Sao_Paulo", hour: "2-digit", minute: "2-digit" });
  const dElement = document.getElementById("data");
  if(dElement) {
    const opcoes = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Sao_Paulo' };
    dElement.innerText = agora.toLocaleDateString("pt-BR", opcoes);
  }
}
setInterval(atualizarWidgetHorario, 1000);
atualizarWidgetHorario();

const CIDADES_CLIMA = [
  { nome: "Artur Nogueira SP", lat: -22.57, lon: -47.17, temp: "--°C", icone: "" },
  { nome: "Cosmópolis SP", lat: -22.64, lon: -47.19, temp: "--°C", icone: "" },
  { nome: "Eng. Coelho SP", lat: -22.48, lon: -47.20, temp: "--°C", icone: "" },
  { nome: "Conchal SP", lat: -22.33, lon: -47.17, temp: "--°C", icone: "" },
  { nome: "Limeira SP", lat: -22.56, lon: -47.40, temp: "--°C", icone: "" },
  { nome: "Holambra SP", lat: -22.63, lon: -47.05, temp: "--°C", icone: "" },
  { nome: "Paulínia SP", lat: -22.76, lon: -47.15, temp: "--°C", icone: "" },
  { nome: "Leme SP", lat: -22.18, lon: -47.38, temp: "--°C", icone: "" },
  { nome: "S. A. de Posse SP", lat: -22.60, lon: -46.91, temp: "--°C", icone: "" },
  { nome: "Sta C. da Conceição SP", lat: -22.13, lon: -47.46, temp: "--°C", icone: "" },
  { nome: "Mogi Mirim SP", lat: -22.43, lon: -46.95, temp: "--°C", icone: "" },
  { nome: "Mogi Guaçu SP", lat: -22.37, lon: -46.94, temp: "--°C", icone: "" }
];

let paginaClimaAtual = 0;
const cidadesPorSlide = 2; // AJUSTADO: Apenas 2 cidades por exibição

function processarIconeClima(code) {
  let imgUrl = "https://cdn-icons-png.flaticon.com/512/869/869869.png"; 
  if(code === 1 || code === 2) imgUrl = "https://cdn-icons-png.flaticon.com/512/1163/1163736.png"; 
  if(code === 3) imgUrl = "https://cdn-icons-png.flaticon.com/512/252/252035.png"; 
  if(code >= 51 && code <= 67) imgUrl = "https://cdn-icons-png.flaticon.com/512/3351/3351979.png"; 
  if(code >= 80) imgUrl = "https://cdn-icons-png.flaticon.com/512/1779/1779927.png";
  return imgUrl;
}

function atualizarDadosDeTodasCidades() {
  CIDADES_CLIMA.forEach((cidade, index) => {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${cidade.lat}&longitude=${cidade.lon}&current_weather=true`)
      .then(r => r.json()).then(dados => {
        if(dados && dados.current_weather) {
          CIDADES_CLIMA[index].temp = `${Math.round(dados.current_weather.temperature)}°C`;
          CIDADES_CLIMA[index].icone = processarIconeClima(dados.current_weather.weathercode);
        }
      }).catch(() => {});
  });
}

function rotacionarCidadesWidget() {
  const container = document.getElementById("container-clima");
  if(!container) return;
  const inicio = paginaClimaAtual * cidadesPorSlide;
  const listaExibicao = CIDADES_CLIMA.slice(inicio, inicio + cidadesPorSlide);
  let html = "";
  listaExibicao.forEach(c => {
    html += `<div class="item-cidade"><div class="cidade-nome">${c.nome}</div><div class="clima-info">${c.icone ? `<img src="${c.icone}">` : ''}<div class="temp">${c.temp}</div></div></div>`;
  });
  container.innerHTML = html;
  paginaClimaAtual = (paginaClimaAtual + 1) % (CIDADES_CLIMA.length / cidadesPorSlide);
}

atualizarDadosDeTodasCidades();
setInterval(atualizarDadosDeTodasCidades, 900000);
setTimeout(rotacionarCidadesWidget, 2000);
setInterval(rotacionarCidadesWidget, 10000);

/* MOTOR DE NOTÍCIAS COM MULTI-FALLBACK */
function atualizarNoticias() {
  const rssTarget = "https://g1.globo.com/rss/g1/sp/campinas-regiao/";
  fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssTarget)}`)
    .then(r => r.json())
    .then(dados => {
      if (dados && dados.items && dados.items.length > 0) {
        mapearNoticias(dados.items);
      } else {
        tentarProvedorAlternativo(rssTarget);
      }
    })
    .catch(() => {
      tentarProvedorAlternativo(rssTarget);
    });
}

function tentarProvedorAlternativo(target) {
  fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`)
    .then(r => r.json())
    .then(dados => {
      const parser = new DOMParser();
      const xml = parser.parseFromString(dados.contents, "text/xml");
      const items = Array.from(xml.querySelectorAll("item")).map(item => ({
        title: item.querySelector("title")?.textContent || "",
        pubDate: item.querySelector("pubDate")?.textContent || ""
      }));
      if(items.length > 0) {
        mapearNoticias(items);
      } else {
        inserirNoticiasManuais();
      }
    })
    .catch(() => {
      inserirNoticiasManuais();
    });
}

function mapearNoticias(lista) {
  cacheNoticias = lista.map(item => ({
    titulo: item.title,
    fonte: "G1 Campinas e Região"
  }));
}

function inserirNoticiasManuais() {
  if(cacheNoticias.length === 0) {
    cacheNoticias = [
      { titulo: "Acompanhe as principais informações e atualizações da nossa região nesta tela.", fonte: "Plantão do Interior" },
      { titulo: "Previsão do tempo regional atualizando automaticamente a cada 15 minutos no painel superior.", fonte: "Clima Monitor" }
    ];
  }
}

atualizarNoticias();
setInterval(atualicias, 300000);

function parseDate(t, ajusteHoras = 0) {
  if (!t) return 0;
  const partes = t.replace(/\s+/g, ' ').trim().split(' ');
  const limpo = partes[0];
  let fuso = partes[1] || "+0000";
  const utcMs = Date.UTC(parseInt(limpo.substring(0, 4)), parseInt(limpo.substring(4, 6)) - 1, parseInt(limpo.substring(6, 8)), parseInt(limpo.substring(8, 10)), parseInt(limpo.substring(10, 12)), limpo.length >= 14 ? parseInt(limpo.substring(12, 14)) : 0);
  const sinal = fuso.charAt(0) === '-' ? -1 : 1;
  const offset = ((parseInt(fuso.substring(1, 3)) * 60) + parseInt(fuso.substring(3, 5))) * 60 * 1000;
  return utcMs - (sinal * offset) + (ajusteHoras * 3600000);
}

function renderizarSlide() {
  const box = document.getElementById("carousel");
  if (!box) return;
  box.innerHTML = "";

  if (paginaAtual === totalPaginasCanais) {
    if (cacheNoticias.length === 0) {
      box.innerHTML = `<div class="news-full-card"><div class="news-title">Sincronizando Destaques Regionais...</div></div>`;
      return;
    }
    const noticia = cacheNoticias[indexNoticiaAtual];
    box.innerHTML = `
      <div class="news-full-card">
        <div class="news-header">
          <span class="news-badge">Destaques da Região</span>
          <span class="news-source">Fonte: ${noticia.fonte}</span>
        </div>
        <div class="news-title">${noticia.titulo}</div>
        <div class="news-footer">Região de Cobertura Integrada • Atualizado Automático</div>
      </div>
    `;
    indexNoticiaAtual = (indexNoticiaAtual + 1) % cacheNoticias.length;
    return;
  }

  const now = Date.now();
  const canaisDaPagina = canais.slice(paginaAtual * itensPorPagina, (paginaAtual * itensPorPagina) + itensPorPagina);
  let html = "";
  
  canaisDaPagina.forEach(c => {
    const progs = cacheProgramas.filter(p => (Array.isArray(c.id) ? c.id : [c.id]).includes(p.channel)).sort((a, b) => a.start - b.start);
    const atual = progs.find(p => p.start <= now && p.stop > now);
    const prox = progs.find(p => p.start >= (atual ? atual.stop : now));
    const prog = atual ? Math.max(0, Math.min(100, ((now - atual.start) / (atual.stop - atual.start)) * 100)) : 0;
    const simb = atual?.origem === 1 ? "." : atual?.origem === 2 ? ".." : atual?.origem === 3 ? "..." : "";
    html += `<div class="channel"><div class="logo-container"><img class="logo" src="${c.logo}"></div><div class="channel-info"><div class="title">${c.num} - ${c.nome}</div><div class="program"><b>${atual ? new Date(atual.start).toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"}) : "--:--"}</b> - ${atual?.title || "Sem programação"}</div><div class="progress"><div class="bar" style="width:${prog}%"></div></div><div class="next">➡ ${prox ? new Date(prox.start).toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"}) : "--:--"} - ${prox?.title || "Sem info"} <b>${simb}</b></div></div></div>`;
  });
  box.innerHTML = html;
}

function atualizar(){
  const agora = Date.now();
  const ids = canais.flatMap(c => c.id);
  Promise.all(EPG_URLS.map(f => fetch(f.url).then(r => r.text()).then(str => {
    const xml = new DOMParser().parseFromString(str, "text/xml");
    return Array.from(xml.querySelectorAll("programme")).filter(p => ids.includes(p.getAttribute("channel"))).map(p => ({ channel: p.getAttribute("channel"), start: parseDate(p.getAttribute("start"), f.ajusteHoras), stop: parseDate(p.getAttribute("stop"), f.ajusteHoras), title: p.querySelector("title")?.textContent || "Sem título", origem: f.idFonte })).filter(p => p.stop > agora);
  }).catch(() => []))).then(res => { cacheProgramas = res.flat(); renderizarSlide(); });
}

atualizar();
setInterval(atualizar, 60000); 

setInterval(() => {
  paginaAtual = (paginaAtual + 1) % (totalPaginasCanais + 1); 
  renderizarSlide();
}, 15000);
</script>

</body>
</html>
