<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GUIA TV + OVERLAY</title>

<style>
html, body {
  width: 100%;
  height: 1080px;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent; 
  font-family: 'Segoe UI', Arial, sans-serif;
  color: #fff;
}

/* ==========================================
   WIDGET DE DATA, HORA E CLIMA (MODERNO)
   ========================================== */
.widget-moderno {
  position: fixed;
  top: 30px;
  right: 40px;
  display: flex;
  flex-direction: column;
  align-items: flex-end; 
  gap: 4px;
  padding: 15px 25px;
  background: rgba(15, 15, 15, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  z-index: 10000;
}

.widget-moderno .hora {
  font-size: 54px;
  font-weight: 700;
  letter-spacing: 1px;
  line-height: 1;
  text-shadow: 0 0 12px rgba(0,0,0,0.4);
}

.widget-moderno .data-clima {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  font-weight: 400;
  opacity: 0.9;
  text-transform: capitalize; 
}

.widget-moderno .clima-grupo {
  display: flex;
  align-items: center;
  gap: 4px;
  border-left: 1px solid rgba(255, 255, 255, 0.3);
  padding-left: 12px;
}

.widget-moderno img {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.5));
}

/* ==========================================
   CAROUSEL E GUIA DE PROGRAMAÇÃO
   ========================================== */
.carousel-container {
  width: 100%;
  position: fixed;
  bottom: 0;
  left: 0;
  background: transparent !important; 
  backdrop-filter: none !important;    
  padding: 20px 0;
  box-sizing: border-box;
  z-index: 9999;
}

.carousel-wrapper {
  overflow: hidden;
  width: calc(100% - 80px); 
  margin: 0 auto;
}

.carousel-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 140px); 
  gap: 18px; 
  width: 100%;
}

.channel {
  height: 140px;
  background: rgba(20, 20, 20, 0.8); 
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  box-sizing: border-box;
  display: flex;
  flex-direction: row; 
  align-items: center; 
  gap: 15px;               
}

.logo-container {
  width: 85px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0; 
}

.logo {
  max-width: 100%;
  max-height: 90px;
  object-fit: contain;
}

.channel-info {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0; 
}

.title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.program {
  font-size: 13px;
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2; 
  -webkit-box-orient: vertical;
}

.next {
  font-size: 12px;
  opacity: .7;
  margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.progress {
  height: 4px;
  background: rgba(255, 255, 255, 0.15);
  margin-top: 8px;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: #00c853; 
  border-radius: 10px;
}
</style>
</head>

<div class="widget-moderno">

/* ===== RELÓGIO E DATA (WIDGET SUPERIOR) ===== */
function atualizarWidgetHorario() {
  const agora = new Date();
  
  // Atualiza Hora
  const hElement = document.getElementById("hora");
  if(hElement) {
    hElement.innerText = agora.toLocaleTimeString("pt-BR", {
      timeZone: "America/Sao_Paulo",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  // Atualiza Data (Ex: Sábado, 13 de Junho)
  const dElement = document.getElementById("data");
  if(dElement) {
    const opcoes = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Sao_Paulo' };
    dElement.innerText = agora.toLocaleDateString("pt-BR", opcoes);
  }
}
setInterval(atualizarWidgetHorario, 1000);

/* ===== MOTOR DE CLIMA AUTOMÁTICO (FREE) ===== */
function obterClima() {
  // Coordenadas padrão de Leme / São Paulo
  const lat = -22.18;
  const lon = -47.38;
  const urlClima = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

  fetch(urlClima)
    .then(r => r.json())
    .then(dados => {
      if(dados && dados.current_weather) {
        const temp = Math.round(dados.current_weather.temperature);
        const code = dados.current_weather.weathercode;
        
        document.getElementById("temp").innerText = `${temp}°C`;
        
        // Mapeamento básico de ícones climáticos nativos baseados em códigos mundiais
        let imgUrl = "https://cdn-icons-png.flaticon.com/512/869/869869.png"; // Sol padrao
        if(code >= 1 && code <= 3) imgUrl = "https://cdn-icons-png.flaticon.com/512/1163/1163736.png"; // Nublado
        if(code >= 51 && code <= 67) imgUrl = "https://cdn-icons-png.flaticon.com/512/3351/3351979.png"; // Chuva
        if(code >= 80) imgUrl = "https://cdn-icons-png.flaticon.com/512/1779/1779927.png"; // Tempestade
        
        const imgEl = document.getElementById("icone");
        imgEl.src = imgUrl;
        imgEl.style.display = "block";
      }
    })
    .catch(() => console.log("Falha ao obter clima. Reconectando em breve."));
}
obterClima();
setInterval(obterClima, 900000); // Atualiza o clima a cada 15 minutos

/* ===== PARSER MATEMÁTICO BLINDADO CONTRA ESPAÇOS ===== */
function parseDate(t) {
  if (!t) return 0;
  
  const limpoStr = t.replace(/\s+/g, ' ').trim();
  const partes = limpoStr.split(' ');
  const limpo = partes[0];
  let fusoOriginal = partes[1] || "+0000";

  if (limpo.length < 12) return 0;

  const ano = parseInt(limpo.substring(0, 4), 10);
  const mes = parseInt(limpo.substring(4, 6), 10) - 1;
  const dia = parseInt(limpo.substring(6, 8), 10);
  const hora = parseInt(limpo.substring(8, 10), 10);
  const min = parseInt(limpo.substring(10, 12), 10);
  const seg = limpo.length >= 14 ? parseInt(limpo.substring(12, 14), 10) : 0;

  let utcMs = Date.UTC(ano, mes, dia, hora, min, seg);

  if(fusoOriginal.toLowerCase() === "ut" || fusoOriginal.toLowerCase() === "utc" || fusoOriginal.toLowerCase() === "gmt") {
    fusoOriginal = "+0000";
  }
  
  const sinal = fusoOriginal.charAt(0) === '-' ? -1 : 1;
  let fusoHoras = parseInt(fusoOriginal.substring(1, 3), 10);
  let fusoMinutos = parseInt(fusoOriginal.substring(3, 5), 10);
  
  if (isNaN(fusoHoras)) fusoHoras = 0;
  if (isNaN(fusoMinutos)) fusoMinutos = 0;

  const offsetMs = ((fusoHoras * 60) + fusoMinutos) * 60 * 1000;
  return utcMs - (sinal * offsetMs);
}

function calc(start, stop){
  const now = Date.now();
  if(!start || !stop || (stop - start) <= 0) return 0;
  return Math.max(0, Math.min(100, ((now - start) / (stop - start)) * 100));
}

function hora(timestamp){
  if(!timestamp) return "--:--";
  const d = new Date(timestamp);
  return d.toLocaleTimeString("pt-BR", {
    timeZone: "America/Sao_Paulo",
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* ===== RENDERIZADOR ROBUSTO COM FILTRO CRONOLÓGICO ===== */
function renderizarSlide() {
  const box = document.getElementById("carousel");
  if (!box) return;
  
  box.innerHTML = "";
  const now = Date.now();

  const inicioIndex = paginaAtual * itensPorPagina;
  const fimIndex = inicioIndex + itensPorPagina;
  const canaisDaPagina = canais.slice(inicioIndex, fimIndex);

  let htmlFinal = "";

  canaisDaPagina.forEach(c => {
    const listaIds = Array.isArray(c.id) ? c.id : [c.id];

    let programasDoCanal = cacheProgramas.filter(p => listaIds.includes(p.channel))
                                         .sort((a, b) => a.start - b.start);

    let atual = programasDoCanal.find(p => p.start <= now && p.stop > now);
    let pontoDeCorte = atual ? atual.stop : now;
    let prox = programasDoCanal.find(p => p.start >= pontoDeCorte);

    let titulo = atual?.title || "Sem programação comercial";
    let inicio = atual ? hora(atual.start) : "--:--";
    let fim = atual ? hora(atual.stop) : "--:--";

    let proxTitulo = prox?.title || "Sem info";
    let proxHora = prox ? hora(prox.start) : "--:--";

    let prog = atual ? calc(atual.start, atual.stop) : 0;

    htmlFinal += `
      <div class="channel">
        <div class="logo-container">
          <img class="logo" src="${c.logo}" onerror="this.style.display='none'">
        </div>
        <div class="channel-info">
          <div class="title">${c.num} - ${c.nome}</div>
          <div class="program">
            <b>${inicio} - ${fim}</b><br>
            ${titulo}
          </div>
          <div class="progress">
            <div class="bar" style="width:${prog}%"></div>
          </div>
          <div class="next">
            ➡ ${proxHora} - ${proxTitulo}
          </div>
        </div>
      </div>
    `;
  });

  box.innerHTML = htmlFinal;
}

/* ===== FILTRAGEM, DOWNLOAD E ZERAGEM DE CACHE COLETIVO ===== */
function atualizar(){
  const agora = Date.now();
  const todosOsIdsValidos = canais.flatMap(c => c.id);

  const requisicoes = EPG_URLS.map(url => 
    fetch(url)
      .then(r => r.text())
      .then(str => new DOMParser().parseFromString(str, "text/xml"))
      .then(xml => {
        const elementos = Array.from(xml.querySelectorAll("programme"));
        const extraidos = [];

        elementos.forEach(p => {
          const chId = p.getAttribute("channel");
          
          if (todosOsIdsValidos.includes(chId)) {
            const startMs = parseDate(p.getAttribute("start"));
            const stopMs = parseDate(p.getAttribute("stop"));

            if (stopMs > agora) {
              extraidos.push({
                channel: chId,
                start: startMs,
                stop: stopMs,
                title: p.querySelector("title")?.textContent || "Sem título"
              });
            }
          }
        });
        return extraidos;
      })
      .catch(err => {
        console.warn(`Erro na fonte: ${url}`, err);
        return [];
      })
  );

  Promise.all(requisicoes).then(resultados => {
    cacheProgramas = resultados.flat();
    renderizarSlide(); 
  });
}

// Inicializações
atualizar();
setInterval(atualizar, 60000); 

/* ===== TROCA AUTOMÁTICA DE PÁGINA (15 Segundos) ===== */
setInterval(() => {
  const totalPaginas = Math.ceil(canais.length / itensPorPagina);
  paginaAtual++;
  if (paginaAtual >= totalPaginas) paginaAtual = 0; 
  renderizarSlide();
}, 15000);
</script>
